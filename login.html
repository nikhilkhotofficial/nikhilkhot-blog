<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Join ChildMind</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@600&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  body { background: #f1f5f9; font-family: 'DM Sans', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
  .card { background: #fff; padding: 50px; border-radius: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.05); width: 100%; max-width: 400px; text-align: center; }
  .logo { font-family: 'Lora', serif; font-size: 28px; font-weight: 700; margin-bottom: 30px; }
  .logo span { color: #2563eb; }
  .btn-google { display: flex; align-items: center; justify-content: center; width: 100%; padding: 14px; border: 1px solid #e2e8f0; border-radius: 12px; cursor: pointer; font-weight: 600; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">Child<span>Mind</span></div>
  <p style="color:#64748b; margin-bottom: 30px;">Access exclusive developmental research.</p>
  <button class="btn-google">Sign in with Google</button>
</div>
</body>
</html>
